name: Podcast
options:
  bundleIdPrefix: io.f7z
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 456SHKPP26
targets:
  Podcast:
    type: application
    platform: iOS
    sources:
      - path: Podcast
      # Live Activity attributes are shared verbatim with the
      # PodcastWidget extension (which renders the activity). The
      # two targets cannot import each other, so we list the same
      # Swift source file under both `sources:` entries — Apple's
      # standard ActivityKit pattern.
      - path: Shared/PodcastActivityAttributes.swift
    info:
      path: Podcast/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        CFBundleDisplayName: Pod0
        UIApplicationSupportsIndirectInputEvents: true
        # Handoff (NSUserActivity) — keep in lock-step with
        # `HandoffState.activityPlaying` / `activityBrowsing` in
        # `Podcast/Capabilities/PlatformCapability.swift`.
        NSUserActivityTypes:
          - io.f7z.podcast.playing
          - io.f7z.podcast.browsing
        # CarPlay scene wiring. The OS instantiates
        # `CarPlaySceneDelegate` (in `Features/Platform/`) on head-unit
        # connect via the `CPTemplateApplicationScene` role. Multiple
        # scenes are required so the iPhone window scene and the
        # CarPlay scene can coexist.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneClassName: CPTemplateApplicationScene
                UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
        # Live Activity opt-in keys. The frequent-updates key lets
        # the OS bill us against the higher budget tier so per-second
        # position updates from the kernel snapshot loop reach the
        # lock screen without being throttled.
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        NSMicrophoneUsageDescription: Pod0 listens to your voice so you can drive the player and the agent hands-free.
        NSSpeechRecognitionUsageDescription: Pod0 transcribes your voice on-device to power voice mode.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.podcast
        PRODUCT_MODULE_NAME: Podcast
        PRODUCT_NAME: Pod0
        CODE_SIGN_ENTITLEMENTS: Podcast/Podcast.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: Podcast/Bridge/NmpCore.h
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]":
          - $(SRCROOT)/../../target/aarch64-apple-ios/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios/release
          - $(HOME)/.cargo/target-shared/aarch64-apple-ios/debug
          - $(HOME)/.cargo/target-shared/aarch64-apple-ios/release
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]":
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/release
          - $(HOME)/.cargo/target-shared/aarch64-apple-ios-sim/debug
          - $(HOME)/.cargo/target-shared/aarch64-apple-ios-sim/release
        # Links the nmp-app-podcast Rust aggregate archive.
        OTHER_LDFLAGS: "$(inherited) -lnmp_app_podcast"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - target: PodcastWidget

  # WidgetKit + ActivityKit extension. Hosts:
  #   - the Live Activity (`PodcastLiveActivityWidget`) rendered on
  #     the lock screen and Dynamic Island while audio is playing;
  #   - (future) the home-screen now-playing widget that reads the
  #     `WidgetSnapshot` JSON `PlatformCapability` already writes
  #     to the shared App Group.
  PodcastWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PodcastWidget
      # Same shared activity-attributes file the main app compiles —
      # this is the contract that lets `Activity.update(...)` from the
      # app reach `ActivityConfiguration<PodcastActivityAttributes>`
      # in the extension.
      - path: Shared/PodcastActivityAttributes.swift
    info:
      path: PodcastWidget/Info.plist
      properties:
        CFBundleDisplayName: Pod0 Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.podcast.widget
        PRODUCT_MODULE_NAME: PodcastWidget
        PRODUCT_NAME: PodcastWidget
        CODE_SIGN_ENTITLEMENTS: PodcastWidget/PodcastWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  PodcastTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PodcastTests
      # Pull the shared activity-attributes file into the test target
      # so `PodcastLiveActivityAttributesTests` validates the same
      # wire contract the main app + widget compile against.
      - path: Shared/PodcastActivityAttributes.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.podcast.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pod0.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Pod0"
    dependencies:
      - target: Podcast

schemes:
  Podcast:
    build:
      targets:
        Podcast: all
        PodcastWidget: all
    test:
      targets:
        - PodcastTests
