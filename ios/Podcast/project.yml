name: Podcast
options:
  bundleIdPrefix: io.f7z
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 456SHKPP26
targets:
  Podcast:
    type: application
    platform: iOS
    sources:
      - path: Podcast
    info:
      path: Podcast/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        CFBundleDisplayName: Pod0
        UIApplicationSupportsIndirectInputEvents: true
        # Handoff (NSUserActivity) — keep in lock-step with
        # `HandoffState.activityPlaying` / `activityBrowsing` in
        # `Podcast/Capabilities/PlatformCapability.swift`.
        NSUserActivityTypes:
          - io.f7z.podcast.playing
          - io.f7z.podcast.browsing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.podcast
        PRODUCT_MODULE_NAME: Podcast
        PRODUCT_NAME: Pod0
        CODE_SIGN_ENTITLEMENTS: Podcast/Podcast.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: Podcast/Bridge/NmpCore.h
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]":
          - $(SRCROOT)/../../target/aarch64-apple-ios/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios/release
          - $(HOME)/.cargo/target-shared/aarch64-apple-ios/debug
          - $(HOME)/.cargo/target-shared/aarch64-apple-ios/release
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]":
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/release
          - $(HOME)/.cargo/target-shared/aarch64-apple-ios-sim/debug
          - $(HOME)/.cargo/target-shared/aarch64-apple-ios-sim/release
        # Links the nmp-app-podcast Rust aggregate archive.
        OTHER_LDFLAGS: "$(inherited) -lnmp_app_podcast"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  PodcastTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PodcastTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.podcast.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pod0.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Pod0"
    dependencies:
      - target: Podcast

schemes:
  Podcast:
    build:
      targets:
        Podcast: all
    test:
      targets:
        - PodcastTests
