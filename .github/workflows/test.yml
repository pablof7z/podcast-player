name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build and Test
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap project
        run: ./ci_scripts/bootstrap_project.sh

      - name: Build and test
        run: ./ci_scripts/run_tests.sh

  android-check:
    name: Android cross-compile check (aarch64-linux-android)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # ubuntu-24.04 runner images ship no preinstalled NDK and never set
      # ANDROID_NDK_LATEST_HOME, and android-actions/setup-android installs
      # the SDK only — so the previous env wiring expanded to an empty prefix
      # ("/toolchains/llvm/...") and cc-rs failed with ToolNotFound on every
      # run. Install the NDK explicitly and reference its output path. The
      # SDK itself is not needed for a cargo cross-check.
      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Assert NDK clang exists (fail loudly, not via cc-rs noise)
        run: |
          CLANG="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang"
          if [ ! -x "$CLANG" ]; then
            echo "::error::NDK clang not found at $CLANG — NDK layout changed?"
            ls "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -40
            exit 1
          fi

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: cargo check — nmp-app-podcast (aarch64-linux-android)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang
        working-directory: apps/nmp-app-podcast
        run: cargo check --target aarch64-linux-android

  swift-bridge-codegen-drift:
    name: Swift bridge codegen drift gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-codegen-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-codegen-

      - name: Run swift-codegen
        working-directory: apps/nmp-app-podcast
        run: cargo run --bin swift-codegen

      - name: Fail if Generated/ files drifted from Rust types
        # Checks that the checked-in Generated/*.generated.swift files match
        # the generator output exactly.  Any hand-edit that changes a wire
        # shape without re-running the generator will cause this step to fail.
        # All Generated/ files are now generator-owned, including
        # PodcastSettingsSnapshot.generated.swift (full explicit CodingKeys).
        run: |
          git diff --exit-code App/Sources/Bridge/Generated/ || {
            echo ""
            echo "ERROR: App/Sources/Bridge/Generated/ has drifted from the Rust"
            echo "projection types.  Re-run \`cargo run --bin swift-codegen\` and"
            echo "commit the updated files."
            exit 1
          }

  workspace-check:
    name: Rust workspace build gate (all members, all targets)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Cargo.lock is gitignored in this repo, so --locked is not applicable.
      # The cache key falls back to a fixed restore-key so partial hits are
      # still useful across dependency bumps.
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-workspace-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-workspace-

      - name: cargo check — full workspace (all members, all targets)
        # --workspace compiles all 8 workspace members including podcast-tui
        # and podcast-agent-core, which the existing android-check and
        # swift-bridge-codegen-drift jobs never reach (they are scoped to
        # -p nmp-app-podcast or apps/nmp-app-podcast/).
        #
        # --all-targets includes test/bench/example compilation units so that
        # type removals or renames that only break #[cfg(test)] code are also
        # caught.
        #
        # This gate was introduced after PR #435 removed an FFI DTO that was
        # still referenced by apps/podcast-tui and auto-merged to a broken main
        # because no existing CI job compiled that workspace member.
        run: cargo check --workspace --all-targets
