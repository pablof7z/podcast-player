name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build and Test
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap project
        run: ./ci_scripts/bootstrap_project.sh

      - name: Build and test
        run: ./ci_scripts/run_tests.sh

  android-check:
    name: Android cross-compile check (aarch64-linux-android)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # ubuntu-24.04 runner images ship no preinstalled NDK and never set
      # ANDROID_NDK_LATEST_HOME, and android-actions/setup-android installs
      # the SDK only — so the previous env wiring expanded to an empty prefix
      # ("/toolchains/llvm/...") and cc-rs failed with ToolNotFound on every
      # run. Install the NDK explicitly and reference its output path. The
      # SDK itself is not needed for a cargo cross-check.
      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Assert NDK clang exists (fail loudly, not via cc-rs noise)
        run: |
          CLANG="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang"
          if [ ! -x "$CLANG" ]; then
            echo "::error::NDK clang not found at $CLANG — NDK layout changed?"
            ls "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -40
            exit 1
          fi

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: cargo check — nmp-app-podcast (aarch64-linux-android)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang
        working-directory: apps/nmp-app-podcast
        run: cargo check --target aarch64-linux-android

  swift-bridge-codegen-drift:
    name: Swift bridge codegen drift gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-codegen-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-codegen-

      - name: Run swift-codegen
        working-directory: apps/nmp-app-podcast
        run: cargo run --bin swift-codegen

      - name: Fail if Generated/ files drifted from Rust types
        # Checks that the checked-in Generated/*.generated.swift files match
        # the generator output exactly.  Any hand-edit that changes a wire
        # shape without re-running the generator will cause this step to fail.
        # All Generated/ files are now generator-owned, including
        # PodcastSettingsSnapshot.generated.swift (full explicit CodingKeys).
        run: |
          git diff --exit-code App/Sources/Bridge/Generated/ || {
            echo ""
            echo "ERROR: App/Sources/Bridge/Generated/ has drifted from the Rust"
            echo "projection types.  Re-run \`cargo run --bin swift-codegen\` and"
            echo "commit the updated files."
            exit 1
          }

  android-kotlin-check:
    name: Android Kotlin compile + unit tests
    # Closes the gap where CI only ran `cargo check` on the Rust lib but never
    # compiled any Kotlin — allowing breaks like PR #430 (DomainFrameWireTest
    # compile failure) to reach main undetected.  PR #439's 35 unit tests were
    # the first Kotlin+Gradle verification on current main; this gate makes that
    # automatic on every PR going forward.
    #
    # Tool-version sources (all pinned to match repo reality):
    #   JDK 17       — android/Podcast/app/build.gradle.kts compileOptions + jvmTarget
    #   compileSdk 34 — android/Podcast/app/build.gradle.kts compileSdk
    #   AGP 8.5.2    — android/Podcast/build.gradle.kts com.android.application version
    #   Kotlin 1.9.24 — android/Podcast/build.gradle.kts kotlin.android version
    #   Gradle 8.7   — android/Podcast/gradle/wrapper/gradle-wrapper.properties
    #   NDK r27c     — matches existing android-check job (test.yml line ~52)
    #   ABIs         — arm64-v8a + x86_64 from build.gradle.kts abiFilters + cargoNdk task
    #   Rust targets — aarch64-linux-android + x86_64-linux-android (same ABIs)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # JDK 17 — required by android/Podcast/app/build.gradle.kts:
      #   compileOptions { sourceCompatibility = JavaVersion.VERSION_17
      #                    targetCompatibility = JavaVersion.VERSION_17 }
      #   kotlinOptions { jvmTarget = "17" }
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Android SDK with build-tools and platform for compileSdk 34
      # (AGP 8.5.2 requires it; android/Podcast/app/build.gradle.kts compileSdk = 34).
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform + build-tools
        run: |
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      # NDK r27c — same version as the existing android-check job (test.yml ~line 52).
      # cargo-ndk invoked by preBuild (build.gradle.kts cargoNdk task) needs the NDK
      # to cross-compile libnmp_app_podcast.so for arm64-v8a and x86_64.
      - name: Set up Android NDK r27c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      # Rust stable + both Android targets the cargoNdk task builds:
      #   -t arm64-v8a  → aarch64-linux-android
      #   -t x86_64     → x86_64-linux-android
      # (android/Podcast/app/build.gradle.kts abiFilters + cargoNdk commandLine)
      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-kotlin-gate-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-kotlin-gate-
            ${{ runner.os }}-cargo-android-

      - name: Cache Gradle caches
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      # preBuild depends on cargoNdk (build.gradle.kts line ~137), so
      # compileDebugKotlin triggers a full Rust cross-compile as a side-effect.
      # ANDROID_NDK_HOME must be set so cargo-ndk can locate the toolchain.
      - name: Compile Kotlin + run unit tests
        working-directory: android/Podcast
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          ./gradlew \
            :app:compileDebugKotlin \
            :app:compileDebugUnitTestKotlin \
            :app:testDebugUnitTest \
            --no-daemon \
            --stacktrace

  headless-e2e:
    name: Headless e2e kernel proofs (nipf4 signing + offline scenarios)
    # Runs the headless scenario binary against the full NMP + Podcast kernel.
    # The binary exits 0 when every scenario is either Pass or Skip, and exits
    # 1 when any scenario Fails.  Skip is green by design: scenarios that need
    # external infra (Ollama, relay, nak) already probe and self-Skip when that
    # infra is absent; the gate stays honest without requiring special CI env
    # vars or service containers.
    #
    # Scenarios that run unconditionally on ubuntu-latest (no external infra):
    #   PASS: nipf4_publish  — per-podcast NIP-F4 signing proof (#446)
    #   PASS: key_persistence — nsec round-trip through the kernel store
    #   PASS: identity_import — ImportNsec → active_account in snapshot
    #   PASS: rss_subscribe   — mock RSS feed over 127.0.0.1 (loopback, no WAN)
    #
    # Scenarios that self-Skip on ubuntu-latest (no nak / Ollama / relay):
    #   SKIP: relay_smoke     — nak binary absent
    #   SKIP: social          — nak binary absent
    #   SKIP: inbox_triage    — Ollama not present at localhost:11434
    #   SKIP: wiki_generate   — Ollama not present at localhost:11434
    #   SKIP: comments        — relay.primal.net probe / nak dependency
    #   SKIP: agent_chat      — Ollama / relay dependency
    #   SKIP: agent_notes     — Ollama / relay dependency
    #   SKIP: discover_nostr  — relay.primal.net probe
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Cache key mirrors workspace-check so builds that run both jobs share
      # registry downloads.  The headless feature adds a few extra crates
      # (tempfile, reqwest) so the key suffix distinguishes it.
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-headless-e2e-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-headless-e2e-
            ${{ runner.os }}-cargo-workspace-

      - name: Run headless e2e suite
        working-directory: apps/nmp-app-podcast
        run: cargo run --bin headless --features headless

  workspace-check:
    name: Rust workspace build gate (all members, all targets)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Cargo.lock is gitignored in this repo, so --locked is not applicable.
      # The cache key falls back to a fixed restore-key so partial hits are
      # still useful across dependency bumps.
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-workspace-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-workspace-

      - name: cargo check — full workspace (all members, all targets)
        # --workspace compiles all 8 workspace members including podcast-tui
        # and podcast-agent-core, which the existing android-check and
        # swift-bridge-codegen-drift jobs never reach (they are scoped to
        # -p nmp-app-podcast or apps/nmp-app-podcast/).
        #
        # --all-targets includes test/bench/example compilation units so that
        # type removals or renames that only break #[cfg(test)] code are also
        # caught.
        #
        # This gate was introduced after PR #435 removed an FFI DTO that was
        # still referenced by apps/podcast-tui and auto-merged to a broken main
        # because no existing CI job compiled that workspace member.
        run: cargo check --workspace --all-targets
