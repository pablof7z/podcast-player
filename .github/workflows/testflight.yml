name: TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      marketing_version:
        description: Optional version override, for example 1.2.0
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_SCHEME: Podcastr
  PROJECT_PATH: Podcastr.xcodeproj
  APP_INFO_PLIST: App/Resources/Info.plist
  WIDGET_INFO_PLIST: App/Widget/Resources/Info.plist
  APPLE_TEAM_ID: 456SHKPP26
  APP_BUNDLE_ID: io.f7z.podcast
  WIDGET_BUNDLE_ID: io.f7z.podcast.widget

jobs:
  # Free GitHub-hosted gate: only spend the single self-hosted runner on a
  # TestFlight build when the marketing version (CFBundleShortVersionString in
  # App/Resources/Info.plist) actually changed in this push — or on a manual
  # workflow_dispatch. Every other main push (features, fixes, wiki autodocs,
  # etc.) skips the heavy build/test/deploy entirely. This is the throttle that
  # stops a fast merge cadence from saturating the runner.
  gate:
    name: Version-bump gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decide whether to deploy
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          plist="${APP_INFO_PLIST:-App/Resources/Info.plist}"
          ver_at() {
            git show "$1:$plist" 2>/dev/null \
              | python3 -c "import sys,plistlib; print(plistlib.loads(sys.stdin.buffer.read()).get('CFBundleShortVersionString',''))" 2>/dev/null \
              || true
          }
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch — deploying."
            echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          cur="$(ver_at HEAD)"
          if [ -z "$BEFORE_SHA" ] || printf '%s' "$BEFORE_SHA" | grep -qE '^0+$'; then
            echo "No usable before-SHA (new branch / force-push) — not a version bump; skipping."
            echo "deploy=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          prev="$(ver_at "$BEFORE_SHA")"
          echo "CFBundleShortVersionString: previous='${prev}' current='${cur}'"
          if [ -n "$cur" ] && [ "$cur" != "$prev" ]; then
            echo "Version changed — deploying to TestFlight."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged — skipping TestFlight (bump CFBundleShortVersionString to release)."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Build and Test
    needs: gate
    if: needs.gate.outputs.deploy == 'true'
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap project
        run: ./ci_scripts/bootstrap_project.sh

      - name: Build and test (unit suite gates the deploy)
        # Deploy gates on the deterministic unit suite. The simulator-flaky
        # end-to-end PodcastrUITests (audio-start timing, app lifecycle) are
        # run by the separate `Test` workflow on every PR, not as a release
        # blocker. The resume-across-restart P0 test requires a force-quit
        # lifecycle that is only reliable in the per-PR simulator lane.
        run: SKIP_UI_TESTS=1 ./ci_scripts/run_tests.sh

  deploy:
    name: Archive And Upload
    runs-on: self-hosted
    needs: [gate, test]
    if: needs.gate.outputs.deploy == 'true'
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version

      - name: Bootstrap project
        run: ./ci_scripts/bootstrap_project.sh

      - name: Install signing assets
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          APP_PROVISION_PROFILE_BASE64: ${{ secrets.APP_PROVISION_PROFILE_BASE64 }}
          WIDGET_PROVISION_PROFILE_BASE64: ${{ secrets.WIDGET_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: ./ci_scripts/install_signing_assets.sh

      - name: Archive, export, and upload
        id: deploy
        env:
          MARKETING_VERSION: ${{ inputs.marketing_version || '' }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_PROVIDER: ${{ secrets.APP_STORE_CONNECT_PROVIDER }}
        run: ./ci_scripts/archive_and_upload.sh

      - name: Upload exported IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-export
          path: |
            build/ExportOptions.plist
            build/testflight-export
          if-no-files-found: ignore

      - name: Cleanup signing assets
        if: always()
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: ./ci_scripts/cleanup_signing_assets.sh
