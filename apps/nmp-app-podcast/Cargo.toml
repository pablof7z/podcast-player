[package]
name = "nmp-app-podcast"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Per-app Podcast glue. Owns the kernel composition root, wires nmp-app-template defaults, and surfaces the projected state over a static-lib FFI for the iOS shell."

[lib]
name = "nmp_app_podcast"
# Static lib so the iOS shell can link `-lnmp_app_podcast` alongside
# `-lnmp_core`. The crate's `#[no_mangle] extern "C"` symbols
# (`nmp_app_podcast_register`, `nmp_app_podcast_snapshot`,
# `nmp_app_podcast_snapshot_free`, `nmp_app_podcast_unregister`) land in
# their own archive (doctrine D0 forbids `nmp-core` from carrying
# podcast-domain nouns, so they cannot be re-exported through
# `libnmp_core.a`).
#
# `cdylib` is added for M2.F: cargo-ndk packs the same crate as a
# `libnmp_app_podcast.so` for Android, exposing the JNI shim in
# `src/android.rs` (gated `#[cfg(target_os = "android")]`). Same cargo
# binary, second platform.
crate-type = ["staticlib", "rlib", "cdylib"]

[features]
# Persistent local cache / publish-intent ledger for offline-first Podcast.
lmdb-backend = ["nmp-core/lmdb-backend"]

[dependencies]
nmp-core = { path = "../../../nostrmultiplatform/crates/nmp-core" }
# `nmp-ffi` owns the `NmpApp` C-ABI handle. Podcast's
# `nmp_app_podcast_register` takes `*mut NmpApp`; the per-app crate names
# the handle + FFI symbols (`nmp_app_dispatch_action`, etc.) through this
# dep.
nmp-ffi = { path = "../../../nostrmultiplatform/crates/nmp-ffi" }
nmp-signer-broker = { path = "../../../nostrmultiplatform/crates/nmp-signer-broker" }
# Canonical NMP composition root. One call wires the default action modules
# (NIP-02 / NIP-17 / NIP-57 / NIP-65), the kind:10050 ingest parser, the
# production routing substrate, and the DM-inbox + zap-receipts runtime
# controllers. Podcast's `nmp_app_podcast_register` calls `register_defaults`
# once at app init instead of duplicating the boilerplate.
nmp-app-template = { path = "../../../nostrmultiplatform/crates/nmp-app-template" }
# `nostr` reconstructs typed `Event` / `Keys` / `PublicKey` / `RelayUrl`
# values from C-ABI JSON. Pinned to 0.44.
nostr = { version = "0.44", default-features = false, features = ["std"] }
# Domain types + projections live in `podcast-core`; the per-app FFI crate
# consumes them when composing the snapshot. M2.A wires the dep so later
# milestones can publish actions and observe projections without churn.
podcast-core = { path = "../podcast-core" }
# Agent-chat domain (conversations, approvals, tasks, memory). M7.A wires
# the dep so the FFI snapshot can surface `agent: ConversationsSnapshot`
# alongside `now_playing` / `downloads`; the kernel-side action modules
# arrive in M7.B.
podcast-agent-core = { path = "../podcast-agent-core" }
# M5 — re-exports the canonical `HttpRequest` / `HttpResult` / `HttpMethod`
# wire types so `capability::http` mirrors the `capability::audio` /
# `capability::download` layout. The types themselves live in
# `podcast-feeds` (the lower-level consumer); routing them through this
# re-export keeps the per-app capability surface uniform.
podcast-feeds = { path = "../podcast-feeds" }
# Briefing composition + scheduler domain. M9.A wires the dep so the
# FFI snapshot can surface `briefing: BriefingSnapshot` and re-export
# the `podcast.briefing.*` action ids alongside the player/agent ones;
# the kernel-side action modules arrive in M9.B.
podcast-briefings = { path = "../podcast-briefings" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
zeroize = { version = "1", features = ["derive"] }
url = { version = "2.0" }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", default-features = false, features = ["clock"] }

[dev-dependencies]
# Test-support gates expose `nmp_app_new` / `nmp_app_free` so FFI smoke tests
# can spin up a real `NmpApp` rather than mocking the slot.
nmp-core = { path = "../../../nostrmultiplatform/crates/nmp-core", features = ["test-support"] }
nmp-ffi = { path = "../../../nostrmultiplatform/crates/nmp-ffi", features = ["test-support"] }

# ── Android JNI shim ──────────────────────────────────────────────────────
#
# M2.F second-platform proof. `jni` is only linked when cargo targets
# `*-linux-android`, so iOS/macOS builds remain unaffected. cargo-ndk drives
# the cross-compile (see `android/Podcast/app/build.gradle.kts`).
[target.'cfg(target_os = "android")'.dependencies]
jni = { version = "0.21", default-features = false }
