[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

[workspace.dependencies]
nmp-app-template = { version = "0.2.8", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "d8bca3adf52434038d5dfd015a0b30e0ae8ad7fa" }
nmp-core = { version = "0.2.8", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "d8bca3adf52434038d5dfd015a0b30e0ae8ad7fa" }
nmp-ffi = { version = "0.2.8", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "d8bca3adf52434038d5dfd015a0b30e0ae8ad7fa" }
nmp-signer-broker = { version = "0.2.8", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "d8bca3adf52434038d5dfd015a0b30e0ae8ad7fa" }
