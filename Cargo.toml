[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

# NMP pin discipline: all NMP pins (direct + nmp-feedback's internal pin)
# reference the SAME nostr-multi-platform rev so the whole graph compiles
# exactly one copy of each NMP crate (one `NmpApp` type). When bumping NMP,
# bump nmp-feedback in lockstep to a rev that pins the same NMP rev.
[workspace.dependencies]
nmp-defaults = { version = "0.6.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "4fdcb52d68cf4a7d203de3633620155e06e45ec3" }
nmp-core = { version = "0.6.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "4fdcb52d68cf4a7d203de3633620155e06e45ec3" }
nmp-ffi = { version = "0.6.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "4fdcb52d68cf4a7d203de3633620155e06e45ec3" }
nmp-signer-broker = { version = "0.6.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "4fdcb52d68cf4a7d203de3633620155e06e45ec3" }
nmp-feedback = { git = "https://github.com/pablof7z/nmp-feedback.git", rev = "62370505dcd0e942af14d795beeb0b362aa6ea88" }
