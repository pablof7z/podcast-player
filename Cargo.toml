[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

[workspace.dependencies]
nmp-app-template = { version = "0.2.1", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6a0c4fdab48d324a1be24ce361e030c1143a4295" }
nmp-core = { version = "0.2.1", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6a0c4fdab48d324a1be24ce361e030c1143a4295" }
nmp-ffi = { version = "0.2.1", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6a0c4fdab48d324a1be24ce361e030c1143a4295" }
nmp-signer-broker = { version = "0.2.1", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6a0c4fdab48d324a1be24ce361e030c1143a4295" }
