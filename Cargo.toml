[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

# NMP pin discipline: all NMP pins (direct + nmp-feedback's internal pin)
# reference the SAME nostr-multi-platform rev so the whole graph compiles
# exactly one copy of each NMP crate (one `NmpApp` type). When bumping NMP,
# bump nmp-feedback in lockstep to a rev that pins the same NMP rev.
[workspace.dependencies]
nmp-defaults = { version = "0.4.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "e0c329d157a0bb039cc847f99a2c1e60dce42fce" }
nmp-core = { version = "0.4.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "e0c329d157a0bb039cc847f99a2c1e60dce42fce" }
nmp-ffi = { version = "0.4.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "e0c329d157a0bb039cc847f99a2c1e60dce42fce" }
nmp-signer-broker = { version = "0.4.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "e0c329d157a0bb039cc847f99a2c1e60dce42fce" }
nmp-feedback = { git = "https://github.com/pablof7z/nmp-feedback.git", rev = "ba66baf502aaaf713cac2d70a499b272fae7afe7" }
