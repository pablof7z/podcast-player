[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

# NMP pin discipline: all NMP pins (direct + nmp-feedback's internal pin)
# reference the SAME nostr-multi-platform rev so the whole graph compiles
# exactly one copy of each NMP crate (one `NmpApp` type). When bumping NMP,
# bump nmp-feedback in lockstep to a rev that pins the same NMP rev.
[workspace.dependencies]
nmp-defaults = { version = "0.5.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "65fd349dd7ff9af9121df7ddea6476d377877880" }
nmp-core = { version = "0.5.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "65fd349dd7ff9af9121df7ddea6476d377877880" }
nmp-ffi = { version = "0.5.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "65fd349dd7ff9af9121df7ddea6476d377877880" }
nmp-signer-broker = { version = "0.5.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "65fd349dd7ff9af9121df7ddea6476d377877880" }
nmp-feedback = { git = "https://github.com/pablof7z/nmp-feedback.git", rev = "41fd4b4e4de945481ed7e6d9b6a941d0775b7fd6" }
