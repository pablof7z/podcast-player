[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-briefings",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

[workspace.dependencies]
nmp-app-template = { version = "0.1.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ec15edef6e7012b96132b4128e691f0e17837438" }
nmp-core = { version = "0.1.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ec15edef6e7012b96132b4128e691f0e17837438" }
nmp-ffi = { version = "0.1.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ec15edef6e7012b96132b4128e691f0e17837438" }
nmp-signer-broker = { version = "0.1.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ec15edef6e7012b96132b4128e691f0e17837438" }
