[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-briefings",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

[workspace.dependencies]
nmp-app-template = { version = "0.2.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ae7b00481056a66894bec55c0817eeb9fb7b17a9" }
nmp-core = { version = "0.2.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ae7b00481056a66894bec55c0817eeb9fb7b17a9" }
nmp-ffi = { version = "0.2.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ae7b00481056a66894bec55c0817eeb9fb7b17a9" }
nmp-signer-broker = { version = "0.2.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ae7b00481056a66894bec55c0817eeb9fb7b17a9" }
