[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

[workspace.dependencies]
nmp-app-template = { version = "0.2.5", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "cab12a8eaf6268b7a897190b5bdc8884c19f3af8" }
nmp-core = { version = "0.2.5", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "cab12a8eaf6268b7a897190b5bdc8884c19f3af8" }
nmp-ffi = { version = "0.2.5", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "cab12a8eaf6268b7a897190b5bdc8884c19f3af8" }
nmp-signer-broker = { version = "0.2.5", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "cab12a8eaf6268b7a897190b5bdc8884c19f3af8" }
