[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

# NMP pin discipline: all NMP crates (workspace deps + nmp-feedback's internal
# pins) reference the SAME nostr-multi-platform rev so the whole graph compiles
# exactly one copy of each NMP crate (one `NmpApp` type). When bumping NMP:
#   1. Bump all 6 nmp-* rev entries below to the new rev.
#   2. Bump nmp-feedback to a rev that also pins the new NMP rev.
#
# Current rev 6ac2608663fced6f31bb508e1fc9fa9dafecedfc = NMP master @ #1828
# (feat(action): opaque-passthrough route for app-owned host-op namespaces via
# the byte doorway — the Cut-B enabler). This is the rev the byte-doorway
# write migration targets: typed `nmp.publish`/`nmp.blossom.upload` payloads
# ride `ActionPayload::encode` + `encode_dispatch_envelope` +
# `nmp_app_dispatch_action_bytes`, and the app-owned `podcast.*` host-ops ride
# the opaque-passthrough route (`accepts_opaque_payload() -> true`).
# As of v0.8.0 nmp-blossom is a first-class [workspace].members crate in the
# NMP repo, so it resolves as an ordinary git dep at the same rev.
# nmp-feedback@3b9b748 pins this same NMP rev (bumped in lockstep) so the whole
# graph resolves exactly one copy of each NMP crate (one `NmpApp` type).
[workspace.dependencies]
nmp-defaults = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6ac2608663fced6f31bb508e1fc9fa9dafecedfc" }
nmp-core = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6ac2608663fced6f31bb508e1fc9fa9dafecedfc" }
nmp-ffi = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6ac2608663fced6f31bb508e1fc9fa9dafecedfc" }
nmp-signer-broker = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6ac2608663fced6f31bb508e1fc9fa9dafecedfc" }
nmp-blossom = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6ac2608663fced6f31bb508e1fc9fa9dafecedfc" }
nmp-nip02 = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6ac2608663fced6f31bb508e1fc9fa9dafecedfc" }
nmp-planner = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6ac2608663fced6f31bb508e1fc9fa9dafecedfc" }
nmp-feedback = { git = "https://github.com/pablof7z/nmp-feedback.git", rev = "3b9b748aa9836d9fac3afe28c502e0474b8bc0be" }
