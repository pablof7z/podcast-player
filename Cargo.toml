[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-briefings",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

[workspace.dependencies]
nmp-app-template = { version = "0.2.1", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "7be4a771b59228f4b51e2ba7cfce481734d4da9a" }
nmp-core = { version = "0.2.1", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "7be4a771b59228f4b51e2ba7cfce481734d4da9a" }
nmp-ffi = { version = "0.2.1", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "7be4a771b59228f4b51e2ba7cfce481734d4da9a" }
nmp-signer-broker = { version = "0.2.1", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "7be4a771b59228f4b51e2ba7cfce481734d4da9a" }
