[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

# NMP pin discipline: all NMP pins (direct + nmp-feedback's internal pin)
# reference the SAME nostr-multi-platform rev so the whole graph compiles
# exactly one copy of each NMP crate (one `NmpApp` type). When bumping NMP,
# bump nmp-feedback in lockstep to a rev that pins the same NMP rev.
[workspace.dependencies]
nmp-defaults = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6418a7acae78b27ecd7a5a5c102db43a05c1cf6c" }
nmp-core = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6418a7acae78b27ecd7a5a5c102db43a05c1cf6c" }
nmp-ffi = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6418a7acae78b27ecd7a5a5c102db43a05c1cf6c" }
nmp-signer-broker = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6418a7acae78b27ecd7a5a5c102db43a05c1cf6c" }
nmp-blossom = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6418a7acae78b27ecd7a5a5c102db43a05c1cf6c" }
nmp-nip02 = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "6418a7acae78b27ecd7a5a5c102db43a05c1cf6c" }
nmp-feedback = { git = "https://github.com/pablof7z/nmp-feedback.git", rev = "fc0589fc88d61912779741fcce7d4e7176cf9a30" }
