[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

# NMP pin discipline: all NMP crates (workspace deps + nmp-feedback's internal
# pins) reference the SAME nostr-multi-platform rev so the whole graph compiles
# exactly one copy of each NMP crate (one `NmpApp` type). When bumping NMP:
#   1. Bump all 6 nmp-* rev entries below to the new rev.
#   2. Bump nmp-feedback to a rev that also pins the new NMP rev.
#
# Current rev 1e1445973 = nmp-v0.8.0 (382 commits ahead of 9df43816)
# — deleted nmp_app_dispatch_action JSON path; migrated to typed
# nmp_app_dispatch_action_bytes FlatBuffers path. ActionModule-level
# decode_payload opt-in required for podcast.* namespaces. See issue #597.
[workspace.dependencies]
nmp-defaults = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "1e1445973" }
nmp-core = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "1e1445973" }
nmp-ffi = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "1e1445973" }
nmp-signer-broker = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "1e1445973" }
nmp-blossom = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "1e1445973" }
nmp-nip02 = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "1e1445973" }
nmp-nip50 = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "1e1445973" }
nmp-planner = { version = "0.8.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "1e1445973" }
nmp-feedback = { git = "https://github.com/pablof7z/nmp-feedback.git", rev = "1e2b0b5e3e023a3d76e2d05db0f91a270811e7d9" }

# Phase 7 compatibility patch: redirect nmp-feedback to a local fork that pins
# nmp v0.8.0 (1e1445973) and uses nmp_app_dispatch_action_bytes instead of the
# deleted nmp_app_dispatch_action JSON doorway. Remove once an upstream
# nmp-feedback commit pins 1e1445973.
[patch."https://github.com/pablof7z/nmp-feedback.git"]
nmp-feedback = { path = "third-party/nmp-feedback" }
