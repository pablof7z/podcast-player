[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

# NMP pin discipline: all NMP crates (workspace deps + nmp-feedback's internal
# pins) reference the SAME nostr-multi-platform rev so the whole graph compiles
# exactly one copy of each NMP crate (one `NmpApp` type). When bumping NMP:
#   1. Bump all 6 nmp-* rev entries below to the new rev.
#   2. Bump nmp-feedback to a rev that also pins the new NMP rev.
#
# Current rev 45ac8c3e4fd6b4efea1fe8c9c40e18758f41a891 = nmp-v0.7.2. As of this
# release nmp-blossom is un-parked: it is a first-class [workspace].members crate
# in the NMP repo, so it resolves as an ordinary git dep at the same rev as the
# other NMP crates. No vendor/ copy, [patch] redirect, or local-clone workaround
# is needed any more (the prior vendor/nmp-blossom workaround is obsolete).
# nmp-feedback@857dedf45 also pins this same rev (bumped in lockstep).
[workspace.dependencies]
nmp-defaults = { version = "0.7.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "45ac8c3e4fd6b4efea1fe8c9c40e18758f41a891" }
nmp-core = { version = "0.7.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "45ac8c3e4fd6b4efea1fe8c9c40e18758f41a891" }
nmp-ffi = { version = "0.7.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "45ac8c3e4fd6b4efea1fe8c9c40e18758f41a891" }
nmp-signer-broker = { version = "0.7.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "45ac8c3e4fd6b4efea1fe8c9c40e18758f41a891" }
nmp-blossom = { version = "0.7.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "45ac8c3e4fd6b4efea1fe8c9c40e18758f41a891" }
nmp-nip02 = { version = "0.7.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "45ac8c3e4fd6b4efea1fe8c9c40e18758f41a891" }
nmp-feedback = { git = "https://github.com/pablof7z/nmp-feedback.git", rev = "857dedf45be721d748bf4ed55a76144ba89018b9" }
