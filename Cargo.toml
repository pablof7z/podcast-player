[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
]
# podcast-tui still links the deleted nmp-ffi / nmp-defaults C-ABI surface. Its
# rewire onto the UniFFI facade is Epic A's A8 slice (podcast-player#688).
# Excluded from the workspace until then so the A0/A1 pin bump resolves cleanly;
# re-add it to `members` in A8.
exclude = ["apps/podcast-tui"]
resolver = "2"

# NMP pin discipline: every NMP crate references the SAME nostr-multi-platform
# rev so the whole graph compiles exactly one copy of each NMP crate (one
# `NmpApp` type). When bumping NMP, bump every `nmp-*` rev entry below together.
#
# Baseline rev 0c06740a5 = current NMP master HEAD (2026-07-02), pinned as a
# PROVISIONAL baseline because the v1 release train (nostr-multi-platform#2690)
# has not cut a release tag yet — re-pin to the tagged rev once it lands
# (nostr-multi-platform#2721 migration note). This baseline is PAST the nmp-ffi
# deletion (nostr-multi-platform a790c1bf, "Delete nmp-ffi C-ABI crate"):
# `nmp-ffi`, `nmp-signer-broker`, and `nmp-defaults` no longer exist; the native
# surface is `nmp-native-runtime` + `nmp-uniffi` + `nmp-substrate` (ADR-0069).
#
# `nmp-feedback` is intentionally DROPPED here (was a git dep + a stale local
# `third-party/nmp-feedback` compat fork). No nmp-feedback rev pins past the
# nmp-ffi deletion; carrying it would force a second nmp-core copy and require
# the deleted nmp-ffi crate. Re-integration is deferred until nmp-feedback is
# migrated onto the UniFFI surface (pablof7z/nmp-feedback#3), per that issue's
# own resolution. No local shim is carried forward (D4).
[workspace.dependencies]
nmp-core = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
nmp-native-runtime = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
nmp-ownership = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
nmp-substrate = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
nmp-uniffi-support = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
nmp-blossom = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
nmp-nip02 = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
nmp-nip50 = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
nmp-planner = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
nmp-signer-iface = { git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "0c06740a5a1a7aa72cfce3403e646190d947f3d8" }
