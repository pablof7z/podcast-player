[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-briefings",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

[workspace.dependencies]
nmp-app-template = { version = "0.2.4", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "f0b501220edef9d49814dba228f8020b5153a887" }
nmp-core = { version = "0.2.4", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "f0b501220edef9d49814dba228f8020b5153a887" }
nmp-ffi = { version = "0.2.4", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "f0b501220edef9d49814dba228f8020b5153a887" }
nmp-signer-broker = { version = "0.2.4", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "f0b501220edef9d49814dba228f8020b5153a887" }
