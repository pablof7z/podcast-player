[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
    "vendor/nmp-blossom",
]
resolver = "2"

# NMP pin discipline: all NMP pins (direct + nmp-feedback's internal pin)
# reference the SAME nostr-multi-platform rev so the whole graph compiles
# exactly one copy of each NMP crate (one `NmpApp` type). When bumping NMP,
# bump nmp-feedback in lockstep to a rev that pins the same NMP rev.
[workspace.dependencies]
nmp-defaults = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ac7e307e89b57a73b419ea9588275e599dcb228c" }
nmp-core = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ac7e307e89b57a73b419ea9588275e599dcb228c" }
nmp-ffi = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ac7e307e89b57a73b419ea9588275e599dcb228c" }
nmp-signer-broker = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ac7e307e89b57a73b419ea9588275e599dcb228c" }
nmp-blossom = { version = "0.6.2", path = "vendor/nmp-blossom" }
nmp-nip02 = { version = "0.6.2", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "ac7e307e89b57a73b419ea9588275e599dcb228c" }
nmp-feedback = { git = "https://github.com/pablof7z/nmp-feedback.git", rev = "f3830d67021311c83a4e2bdeae2e8c463daaa279" }

# nmp-blossom is vendored at vendor/nmp-blossom (see vendor/nmp-blossom/Cargo.toml).
# It is excluded from the NMP workspace at ac7e307e (parked post-v1 / M10), so
# cargo git deps cannot resolve it. Vendoring is the reproducible alternative to
# the /tmp path that was previously committed. The vendor copy is taken verbatim
# from ac7e307e89b57a73b419ea9588275e599dcb228c crates/nmp-blossom with only the
# workspace-inherited fields replaced by explicit values and path deps by workspace
# refs — the Rust source is untouched. A [patch] pointing the git nmp-blossom dep
# to the vendor path ensures any transitive reference is unified.
[patch."https://github.com/pablof7z/nostr-multi-platform.git"]
nmp-blossom = { path = "vendor/nmp-blossom" }
