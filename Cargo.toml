[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

# NMP pin discipline: all NMP pins (direct + nmp-feedback's internal pin)
# reference the SAME nostr-multi-platform rev so the whole graph compiles
# exactly one copy of each NMP crate (one `NmpApp` type). When bumping NMP,
# bump nmp-feedback in lockstep to a rev that pins the same NMP rev.
[workspace.dependencies]
nmp-app-template = { version = "0.4.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "535f6f9959b86dff2fdc62f5501aa8bebe281210" }
nmp-core = { version = "0.4.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "535f6f9959b86dff2fdc62f5501aa8bebe281210" }
nmp-ffi = { version = "0.4.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "535f6f9959b86dff2fdc62f5501aa8bebe281210" }
nmp-signer-broker = { version = "0.4.0", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "535f6f9959b86dff2fdc62f5501aa8bebe281210" }
nmp-feedback = { git = "https://github.com/pablof7z/nmp-feedback.git", rev = "d4debb16798d99dadfd6a89a8871da5614f88d50" }
