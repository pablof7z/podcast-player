[workspace]
members = [
    "apps/nmp-app-podcast",
    "apps/podcast-agent-core",
    "apps/podcast-core",
    "apps/podcast-discovery",
    "apps/podcast-feeds",
    "apps/podcast-knowledge",
    "apps/podcast-transcripts",
    "apps/podcast-tui",
]
resolver = "2"

[workspace.dependencies]
nmp-app-template = { version = "0.2.7", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "e1d502de898b53d85b1f9be52f34cee657f2c278" }
nmp-core = { version = "0.2.7", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "e1d502de898b53d85b1f9be52f34cee657f2c278" }
nmp-ffi = { version = "0.2.7", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "e1d502de898b53d85b1f9be52f34cee657f2c278" }
nmp-signer-broker = { version = "0.2.7", git = "https://github.com/pablof7z/nostr-multi-platform.git", rev = "e1d502de898b53d85b1f9be52f34cee657f2c278" }
